# -----------------------------------------------------------------------------------------
# AWS Landing Zone Accelerator - Security Configuration
# Project: An Post Eircode Service Take-on (Test Environment)
# -----------------------------------------------------------------------------------------

# AWS Config configuration for resource auditing
awsConfig:
  # Requerido por el error: 'enableConfigurationRecorder'
  enableConfigurationRecorder: true
  aggregation:
    # Requerido por el error: la agregación necesita su propio 'enable'
    enable: true
    delegatedAdminAccount: Audit

centralSecurityServices:
  delegatedAdminAccount: Audit

  ebsDefaultVolumeEncryption:
    enable: true
    excludeRegions: []

  s3PublicAccessBlock:
    enable: true
    excludeAccounts: []

  scpRevertChangesConfig:
    enable: true

  # Requerido por el esquema, aunque no lo uses, debes ponerlo explícitamente en 'false'
  macie:
    enable: false

  guardduty:
    enable: true
    exportConfiguration:
      enable: true
      # Requeridos por el error: destinationType y exportFrequency
      destinationType: S3
      exportFrequency: FIFTEEN_MINUTES
    s3Protection:
      enable: true

  securityHub:
    enable: true
    regionAggregation: true
    standards:
      - name: AWS Foundational Security Best Practices v1.0.0
        enable: true

  # Requerido por el error: ssmAutomation debe estar definido
  ssmAutomation:
    enable: true

# Requerido por el error en la raíz del documento
cloudWatch:
  encryption:
    enabled: true
