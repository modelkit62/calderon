# -----------------------------------------------------------------------------------------
# AWS Landing Zone Accelerator - Accounts Configuration
# Project: AP Eircode Service Take-on (Test Environment)
# -----------------------------------------------------------------------------------------
enable: true

# ¡NEW!
taggingPolicies: []

# Service Control Policies (SCPs) definition
serviceControlPolicies:
  - name: Quarantine-DenyAll-SCP
    description: "Strict SCP explicitly denies all access to these accounts except for designated Admin and Security staff."
    policy: service-control-policies/quarantine-deny-all.json
    type: customerManaged
    deploymentTargets:
      organizationalUnits:
        - Quarantine
        
  - name: Enforce-Mandatory-Tags-SCP
    description: "Enforces comprehensive Tagging Policy from Day 1 (CostCentre, Environment, Owner)."
    policy: service-control-policies/require-mandatory-tags.json
    type: customerManaged
    deploymentTargets:
      organizationalUnits: []

# AWS Backup Policies definition
backupPolicies:
  - name: RDS-Nightly-30-Days-Policy
    description: "Automated nightly Amazon RDS backups with a 30-day retention period."
    policy: backup-policies/rds-nightly-30-days.json
    deploymentTargets:
      organizationalUnits:
        - Workloads

# Organizational Units (OUs) hierarchy definition
organizationalUnits:
  - name: Quarantine
  - name: Security
  - name: Infrastructure
  - name: Workloads
  - name: Production
    parent: Workloads
  - name: Non-Production
    parent: Workloads
  - name: Sandbox
    parent: Workloads
  - name: Cementry
    ignore: true
